<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Card</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --text: #1d1d1f;
      --secondary: #86868b;
      --divider: #d2d2d7;
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --danger: #ff3b30;
      --radius: 12px;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 40px 20px 100px;
    }

    .manage {
      width: 100%;
      max-width: 480px;
    }

    .page-header {
      margin-bottom: 32px;
    }

    .page-header h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .page-header p {
      font-size: 14px;
      color: var(--secondary);
      margin-top: 4px;
    }

    /* ── Cards ── */
    .panel {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 0.5px 1px rgba(0,0,0,0.04);
    }

    .panel-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--secondary);
      margin-bottom: 16px;
    }

    /* ── Form fields ── */
    .field {
      margin-bottom: 14px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--secondary);
      margin-bottom: 5px;
    }

    .field input, .field textarea {
      width: 100%;
      padding: 10px 12px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      border: 1px solid transparent;
      border-radius: 8px;
      outline: none;
      transition: border 0.15s, box-shadow 0.15s;
    }

    .field input:focus, .field textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.12);
    }

    .field input::placeholder, .field textarea::placeholder {
      color: var(--divider);
    }

    .field textarea {
      resize: vertical;
      min-height: 60px;
    }

    /* ── Social rows ── */
    .social-entry {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 0.5px solid rgba(210,210,215,0.4);
    }

    .social-entry:last-of-type {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .social-entry .field {
      flex: 1;
      margin-bottom: 0;
    }

    .remove-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: none;
      color: var(--danger);
      font-size: 20px;
      cursor: pointer;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      margin-bottom: 0;
    }

    .remove-btn:hover {
      background: rgba(255, 59, 48, 0.08);
    }

    /* ── Buttons ── */
    .add-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      color: var(--accent);
      background: none;
      border: 1px dashed var(--divider);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 12px;
    }

    .add-btn:hover {
      background: rgba(0, 113, 227, 0.04);
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    .save-btn, .preview-btn {
      flex: 1;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .save-btn {
      background: var(--accent);
      color: white;
    }

    .save-btn:hover {
      background: var(--accent-hover);
    }

    .save-btn:active, .preview-btn:active {
      transform: scale(0.98);
    }

    .preview-btn {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 0.5px 1px rgba(0,0,0,0.08);
    }

    .preview-btn:hover {
      background: #ebebed;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: transform 0.3s, opacity 0.3s;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>

<div class="manage">

  <div class="page-header">
    <h1>Manage Card</h1>
    <p>Edit your info below, then save.</p>
  </div>

  <!-- Profile -->
  <div class="panel">
    <div class="panel-title">Profile</div>
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Andres Cruz" />
    </div>
    <div class="field">
      <label>Title</label>
      <input type="text" id="title" placeholder="Videographer & Creative" />
    </div>
    <div class="field">
      <label>Bio</label>
      <textarea id="bio" placeholder="A short tagline about yourself..."></textarea>
    </div>
    <div class="field">
      <label>Location</label>
      <input type="text" id="location" placeholder="Philippines" />
    </div>
  </div>

  <!-- Socials -->
  <div class="panel">
    <div class="panel-title">Socials</div>
    <div id="socials-list"></div>
    <button class="add-btn" onclick="addSocial()">+ Add Social</button>
  </div>

  <!-- Work -->
  <div class="panel">
    <div class="panel-title">Work Links</div>
    <div id="work-list"></div>
    <button class="add-btn" onclick="addWork()">+ Add Link</button>
  </div>

  <!-- Contact -->
  <div class="panel">
    <div class="panel-title">Contact</div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div class="field">
      <label>Phone</label>
      <input type="tel" id="phone" placeholder="+63 XXX XXX XXXX" />
    </div>
    <div class="field">
      <label>WhatsApp Number (with country code)</label>
      <input type="tel" id="whatsapp" placeholder="+63XXXXXXXXXX" />
    </div>
    <div class="field">
      <label>Telegram Username</label>
      <input type="text" id="telegram" placeholder="@username" />
    </div>
  </div>

  <div class="actions">
    <button class="preview-btn" onclick="window.open('card.html','_blank')">Preview</button>
    <button class="save-btn" onclick="save()">Save Changes</button>
  </div>

</div>

<div class="toast" id="toast">Saved</div>

<script>
  const DEFAULTS = {
    name: 'Andres Cruz',
    title: 'Videographer & Creative',
    bio: 'Crafting visual stories that move people. Open to collaborations, projects, and new connections.',
    location: 'Philippines',
    email: '',
    phone: '',
    whatsapp: '',
    telegram: '',
    socials: [
      { platform: 'Instagram', handle: '@username', url: 'https://instagram.com/' },
      { platform: 'LinkedIn', handle: 'Andres Cruz', url: 'https://linkedin.com/in/' },
      { platform: 'TikTok', handle: '@username', url: 'https://tiktok.com/@' },
      { platform: 'X', handle: '@username', url: 'https://x.com/' }
    ],
    work: [
      { label: 'Resume', description: 'View or download', url: '' },
      { label: 'Portfolio', description: 'Video & creative work', url: '' }
    ]
  };

  function load() {
    try {
      const stored = localStorage.getItem('nfc-card-data');
      return stored ? JSON.parse(stored) : { ...DEFAULTS };
    } catch {
      return { ...DEFAULTS };
    }
  }

  function save() {
    const data = {
      name: document.getElementById('name').value,
      title: document.getElementById('title').value,
      bio: document.getElementById('bio').value,
      location: document.getElementById('location').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value,
      whatsapp: document.getElementById('whatsapp').value,
      telegram: document.getElementById('telegram').value,
      socials: getSocials(),
      work: getWork()
    };
    localStorage.setItem('nfc-card-data', JSON.stringify(data));
    showToast('Saved');
  }

  function getSocials() {
    const entries = document.querySelectorAll('#socials-list .social-entry');
    return Array.from(entries).map(el => ({
      platform: el.querySelector('.s-platform').value,
      handle: el.querySelector('.s-handle').value,
      url: el.querySelector('.s-url').value
    }));
  }

  function getWork() {
    const entries = document.querySelectorAll('#work-list .social-entry');
    return Array.from(entries).map(el => ({
      label: el.querySelector('.w-label').value,
      description: el.querySelector('.w-desc').value,
      url: el.querySelector('.w-url').value
    }));
  }

  function addSocial(s = { platform: '', handle: '', url: '' }) {
    const list = document.getElementById('socials-list');
    const div = document.createElement('div');
    div.className = 'social-entry';
    div.innerHTML = `
      <div class="field"><label>Platform</label><input class="s-platform" placeholder="Instagram" value="${esc(s.platform)}" /></div>
      <div class="field"><label>Handle</label><input class="s-handle" placeholder="@username" value="${esc(s.handle)}" /></div>
      <div class="field"><label>URL</label><input class="s-url" placeholder="https://..." value="${esc(s.url)}" /></div>
      <button class="remove-btn" onclick="this.parentElement.remove()" title="Remove">&times;</button>
    `;
    list.appendChild(div);
  }

  function addWork(w = { label: '', description: '', url: '' }) {
    const list = document.getElementById('work-list');
    const div = document.createElement('div');
    div.className = 'social-entry';
    div.innerHTML = `
      <div class="field"><label>Title</label><input class="w-label" placeholder="Resume" value="${esc(w.label)}" /></div>
      <div class="field"><label>Subtitle</label><input class="w-desc" placeholder="View or download" value="${esc(w.description)}" /></div>
      <div class="field"><label>URL</label><input class="w-url" placeholder="https://..." value="${esc(w.url)}" /></div>
      <button class="remove-btn" onclick="this.parentElement.remove()" title="Remove">&times;</button>
    `;
    list.appendChild(div);
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML.replace(/"/g, '&quot;');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // Init
  const data = load();
  document.getElementById('name').value = data.name || '';
  document.getElementById('title').value = data.title || '';
  document.getElementById('bio').value = data.bio || '';
  document.getElementById('location').value = data.location || '';
  document.getElementById('email').value = data.email || '';
  document.getElementById('phone').value = data.phone || '';
  document.getElementById('whatsapp').value = data.whatsapp || '';
  document.getElementById('telegram').value = data.telegram || '';
  (data.socials || []).forEach(s => addSocial(s));
  (data.work || []).forEach(w => addWork(w));
</script>

</body>
</html>
