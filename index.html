<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Andres Cruz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --text: #1d1d1f;
      --secondary: #86868b;
      --divider: #d2d2d7;
      --hover: #f5f5f7;
      --accent: #0071e3;
      --radius: 16px;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 60px 20px 100px;
    }

    .card {
      width: 100%;
      max-width: 400px;
    }

    /* ── Hero ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 0 0 40px;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: #f5f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 600;
      color: var(--secondary);
      letter-spacing: -0.5px;
      margin-bottom: 20px;
    }

    .name {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.5px;
      line-height: 1.15;
      color: var(--text);
    }

    .title {
      font-size: 15px;
      color: var(--secondary);
      font-weight: 400;
      margin-top: 4px;
      letter-spacing: -0.1px;
    }

    .tagline {
      font-size: 14px;
      color: var(--secondary);
      line-height: 1.5;
      margin-top: 12px;
      max-width: 280px;
    }

    .location {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      color: var(--secondary);
      margin-top: 10px;
    }

    .location svg {
      width: 12px;
      height: 12px;
      opacity: 0.6;
    }

    /* ── Sections ── */
    .section {
      padding-top: 8px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--secondary);
      padding: 0 0 12px;
    }

    .divider {
      height: 1px;
      background: var(--divider);
      opacity: 0.6;
      margin: 0 0 20px;
    }

    /* ── Link rows ── */
    .link-list {
      display: flex;
      flex-direction: column;
      margin-bottom: 32px;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 4px;
      text-decoration: none;
      color: var(--text);
      border-bottom: 0.5px solid rgba(210, 210, 215, 0.5);
      transition: background 0.15s;
    }

    .link-item:last-child {
      border-bottom: none;
    }

    .link-item:hover {
      background: var(--hover);
      border-radius: 10px;
      margin: 0 -8px;
      padding: 14px 12px;
    }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-text {
      flex: 1;
      min-width: 0;
    }

    .link-text .primary {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.1px;
    }

    .link-text .secondary {
      font-size: 12px;
      color: var(--secondary);
      margin-top: 1px;
    }

    .link-arrow {
      color: var(--divider);
      font-size: 16px;
      font-weight: 300;
    }

    /* ── Contact buttons ── */
    .contact-row {
      display: flex;
      gap: 10px;
      margin-bottom: 40px;
    }

    .contact-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 16px 8px;
      background: #f5f5f7;
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      transition: background 0.15s, transform 0.1s;
    }

    .contact-btn:hover {
      background: #ebebed;
      transform: scale(0.98);
    }

    .contact-btn:active {
      transform: scale(0.96);
    }

    .contact-btn .btn-icon {
      font-size: 20px;
    }

    .contact-btn .btn-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: -0.1px;
    }

    .hidden { display: none !important; }

    /* ── Footer ── */
    .footer {
      text-align: center;
      font-size: 11px;
      color: var(--divider);
      letter-spacing: 0.3px;
    }

    /* ── Edit FAB ── */
    .edit-fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      background: var(--text);
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      transition: transform 0.15s;
      z-index: 50;
    }

    .edit-fab:hover { transform: scale(1.08); }
    .edit-fab:active { transform: scale(0.95); }

    /* ── State (loading / message) ── */
    .state {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .state-inner {
      text-align: center;
      max-width: 320px;
    }

    .state-inner h2 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 8px;
    }

    .state-inner p {
      font-size: 14px;
      color: var(--secondary);
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .state-inner .btn {
      display: inline-block;
      background: var(--accent);
      color: white;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 24px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--divider);
      border-top-color: var(--secondary);
      border-radius: 50%;
      margin: 0 auto;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="state" class="state">
  <div class="state-inner">
    <div class="spinner"></div>
  </div>
</div>

<main class="card hidden" id="card">
  <div class="hero">
    <div class="avatar" id="avatar"></div>
    <div class="name" id="card-name"></div>
    <div class="title" id="card-title"></div>
    <p class="tagline" id="card-bio"></p>
    <span class="location" id="card-location">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
        <circle cx="12" cy="9" r="2.5"/>
      </svg>
      <span id="location-text"></span>
    </span>
  </div>

  <div class="section" id="socials-section">
    <div class="divider"></div>
    <div class="section-label">Socials</div>
    <div class="link-list" id="socials-list"></div>
  </div>

  <div class="section" id="work-section">
    <div class="divider"></div>
    <div class="section-label">Work</div>
    <div class="link-list" id="work-list"></div>
  </div>

  <div class="section" id="contact-section">
    <div class="divider"></div>
    <div class="section-label">Contact</div>
    <div class="contact-row" id="contact-row"></div>
  </div>

  <div class="footer">tap · connect · collaborate</div>
</main>

<button class="edit-fab hidden" id="edit-fab" title="Edit Card">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
    <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
  </svg>
</button>

<script type="module">
  import { db, auth, NOT_CONFIGURED } from './firebase-init.js';
  import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { renderCard, esc } from './card-shared.js';

  const CARD_ID = new URLSearchParams(window.location.search).get('id');

  function showState(html) {
    document.getElementById('state').innerHTML = '<div class="state-inner">' + html + '</div>';
    document.getElementById('state').classList.remove('hidden');
    document.getElementById('card').classList.add('hidden');
  }

  function showCard(data) {
    renderCard(data);
    document.getElementById('state').classList.add('hidden');
    document.getElementById('card').classList.remove('hidden');

    // Show the edit pencil only to the signed-in owner of this card.
    onAuthStateChanged(auth, user => {
      const fab = document.getElementById('edit-fab');
      if (user && data.ownerUid && user.uid === data.ownerUid) {
        fab.classList.remove('hidden');
        fab.onclick = () => { window.location.href = 'manage.html?id=' + encodeURIComponent(CARD_ID); };
      } else {
        fab.classList.add('hidden');
      }
    });
  }

  async function init() {
    if (NOT_CONFIGURED) {
      showState('<h2>Setup needed</h2><p>Firebase isn\'t configured yet. Add your project keys to <b>firebase-config.js</b> — see SETUP.md.</p>');
      return;
    }
    if (!CARD_ID) {
      showState('<h2>Packet Cards</h2><p>Tap a Packet Card to view someone\'s profile.</p>');
      return;
    }
    try {
      const snap = await getDoc(doc(db, 'cards', CARD_ID));
      if (snap.exists()) {
        showCard(snap.data());
      } else {
        // Unclaimed card → send them to set it up.
        window.location.href = 'register.html?id=' + encodeURIComponent(CARD_ID);
      }
    } catch (e) {
      showState('<h2>Something went wrong</h2><p>' + esc(e.message) + '</p>');
    }
  }

  init();
</script>

</body>
</html>
