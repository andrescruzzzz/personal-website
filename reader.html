<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tap Station — Packet Cards</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --text: #1d1d1f; --secondary: #86868b; --accent: #0071e3; --divider: #d2d2d7;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased; }
    body { display: flex; align-items: center; justify-content: center; padding: 24px; }
    .station { text-align: center; max-width: 360px; }

    .nfc-ring {
      width: 120px; height: 120px; margin: 0 auto 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; position: relative;
      background: #f5f5f7;
    }
    .nfc-ring::before, .nfc-ring::after {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
      border: 2px solid var(--accent); opacity: 0; animation: pulse 2s ease-out infinite;
    }
    .nfc-ring::after { animation-delay: 1s; }
    @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.6; } 100% { transform: scale(1.5); opacity: 0; } }
    .nfc-ring svg { width: 52px; height: 52px; color: var(--accent); position: relative; z-index: 1; }

    h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.4px; }
    p { font-size: 15px; color: var(--secondary); margin-top: 8px; line-height: 1.5; }

    .status {
      margin-top: 28px; min-height: 44px; font-size: 14px; color: var(--secondary);
      display: flex; align-items: center; justify-content: center;
    }
    .status .chip {
      background: #f5f5f7; border-radius: 10px; padding: 10px 16px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 15px; color: var(--text);
    }
    .hint { margin-top: 40px; font-size: 12px; color: var(--divider); }
    .spin { width: 18px; height: 18px; border: 2px solid var(--divider); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="station">
    <div class="nfc-ring">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 9a9 9 0 0114 0"/><path d="M7.5 12a6 6 0 019 0"/><path d="M10 15a3 3 0 014 0"/>
        <circle cx="12" cy="18.5" r="0.6" fill="currentColor"/>
      </svg>
    </div>
    <h1>Tap your card</h1>
    <p>Hold a Packet Card to the reader to open its profile.</p>
    <div class="status" id="status">Waiting for a card…</div>
    <div class="hint">Keep this page open and focused. Each tap opens that card's profile.</div>
  </div>

<script>
  // USB RFID readers (HID keyboard type) "type" the card's ID then usually press Enter.
  // We capture those keystrokes anywhere on the page and open that card's profile.
  let buffer = '';
  let idle = null;
  const statusEl = document.getElementById('status');

  function go(id) {
    statusEl.innerHTML = '<span class="spin"></span> Opening card <b style="color:#1d1d1f;margin-left:6px">' + id + '</b>…';
    window.location.href = 'card.html?id=' + encodeURIComponent(id);
  }

  function commit() {
    const id = buffer.replace(/\s+/g, '').trim();
    buffer = '';
    if (id.length >= 3) go(id);
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { commit(); return; }
    if (e.key.length === 1) {            // a single printable character from the reader
      buffer += e.key;
      statusEl.innerHTML = '<span class="chip">' + buffer + '</span>';
      clearTimeout(idle);
      idle = setTimeout(commit, 200);    // fallback if the reader doesn't send Enter
    }
  });

  // Keep focus on this window so taps are captured.
  window.addEventListener('blur', () => setTimeout(() => window.focus(), 50));
</script>

</body>
</html>
